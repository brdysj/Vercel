<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 探索世界</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text: #2d3748;
            --accent1: #6c5ce7;
            --accent2: #00b894;
            --accent3: #fdcb6e;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 20px 60px rgba(0, 0, 0, 0.15);
            --radius: 20px;
            --transition: 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #e8edf5 0%, #f0f4f8 30%, #e8f0f5 60%, #f5f0e8 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* 装饰性背景圆 */
        body::before {
            content: '';
            position: fixed;
            top: -180px;
            right: -120px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(108, 92, 231, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -160px;
            left: -100px;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(0, 184, 148, 0.10) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 750px;
            text-align: center;
        }

        .page-badge {
            display: inline-block;
            background: rgba(108, 92, 231, 0.1);
            color: #6c5ce7;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 8px 22px;
            border-radius: 50px;
            margin-bottom: 18px;
            backdrop-filter: blur(4px);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #1a202c;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }
        h1 .highlight {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.15rem;
            color: #5a6c7d;
            margin-bottom: 48px;
            font-weight: 400;
            line-height: 1.6;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .cards-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            h1 {
                font-size: 2rem;
            }
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 36px 28px 32px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            border: 2px solid transparent;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            border-radius: 20px 20px 0 0;
            transition: height 0.35s ease;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }
        .card:active {
            transform: scale(0.96);
            transition: 0.15s ease;
        }
        .card.card-page2::after {
            background: linear-gradient(90deg, #00b894, #55efc4);
        }
        .card.card-page3::after {
            background: linear-gradient(90deg, #fdcb6e, #ffeaa7);
        }
        .card:hover::after {
            height: 8px;
        }

        .card-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            transition: var(--transition);
            flex-shrink: 0;
        }
        .card-page2 .card-icon {
            background: rgba(0, 184, 148, 0.1);
        }
        .card-page3 .card-icon {
            background: rgba(253, 203, 110, 0.18);
        }
        .card:hover .card-icon {
            transform: scale(1.1) rotate(-5deg);
        }

        .card h3 {
            font-size: 1.35rem;
            font-weight: 700;
            color: #1a202c;
            letter-spacing: -0.01em;
        }
        .card p {
            font-size: 0.95rem;
            color: #6b7c8e;
            line-height: 1.5;
            margin: 0;
        }
        .card .arrow-hint {
            display: inline-block;
            margin-top: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            opacity: 0;
            transform: translateY(6px);
            transition: var(--transition);
            color: #6c5ce7;
        }
        .card:hover .arrow-hint {
            opacity: 1;
            transform: translateY(0);
        }
        .card-page2 .arrow-hint {
            color: #00b894;
        }
        .card-page3 .arrow-hint {
            color: #e1a800;
        }

        .footer-note {
            font-size: 0.85rem;
            color: #a0aec0;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="page-badge">🏠 第 1 页 · 首页</span>
        <h1>欢迎来到 <span class="highlight">探索世界</span></h1>
        <p class="subtitle">点击下方卡片，跳转至其他精彩页面</p>

        <div class="cards-grid">
            <!-- 跳转到页面2 -->
            <a href="page2.html" class="card card-page2" title="点击跳转到第二页">
                <div class="card-icon">🌿</div>
                <h3>自然之美</h3>
                <p>探索宁静的自然风光，感受大地的呼吸与生命的律动。</p>
                <span class="arrow-hint">点击前往 →</span>
            </a>

            <!-- 跳转到页面3 -->
            <a href="page3.html" class="card card-page3" title="点击跳转到第三页">
                <div class="card-icon">🎨</div>
                <h3>创意空间</h3>
                <p>灵感与设计的交汇处，发现无限的创意可能性。</p>
                <span class="arrow-hint">点击前往 →</span>
            </a>
        </div>

        <p class="footer-note">💡 提示：点击任意卡片即可跳转</p>
    </div>
</body>
</html>
