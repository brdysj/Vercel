<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复习资料浏览</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --container-bg: #ffffff;
            --text: #555;
            --text-light: #999;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06);
            --accent: #4a6cf7;
            --btn-bg: rgba(0, 0, 0, 0.5);
            --btn-hover: rgba(0, 0, 0, 0.7);
            --loading-shimmer: #e8e8e8;
            --divider-color: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
            overflow-y: scroll;
        }

        /* 加载提示 */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            color: var(--text);
            text-align: center;
            gap: 16px;
            transition: opacity 0.3s;
        }
        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e0e0e0;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-screen .info-text {
            font-size: 14px;
            color: var(--text-light);
        }

        /* 顶部信息栏 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: transform 0.3s ease, opacity 0.3s ease;
            pointer-events: none;
        }
        .top-bar.hidden {
            transform: translateY(-100%);
            opacity: 0;
        }
        .top-bar .info {
            font-size: 13px;
            color: var(--text);
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .top-bar .count {
            font-weight: 600;
            color: var(--accent);
            font-size: 15px;
        }
        .top-bar .divider {
            width: 1px;
            height: 14px;
            background: #ddd;
            border-radius: 1px;
        }
        .top-bar .hint {
            font-size: 11px;
            color: var(--text-light);
            letter-spacing: 0.2px;
        }

        /* 主容器 */
        .main-container {
            max-width: 850px;
            margin: 0 auto;
            padding: 60px 0 40px;
            background: var(--container-bg);
            box-shadow: var(--shadow);
            min-height: 100vh;
            border-left: 1px solid rgba(0, 0, 0, 0.03);
            border-right: 1px solid rgba(0, 0, 0, 0.03);
        }

        /* 图片容器 - 添加分割线 */
        .image-wrapper {
            position: relative;
            width: 100%;
            line-height: 0;
            font-size: 0;
            min-height: 8px;
            background: transparent;
            overflow: hidden;
            border-bottom: 1px solid var(--divider-color);
        }
        /* 最后一个图片容器不需要下边框（动态追加时由CSS自动处理） */
        .image-wrapper:last-child {
            border-bottom: none;
        }

        .image-wrapper img {
            display: block;
            width: 100%;
            height: auto;
            border: none;
            outline: none;
            opacity: 0;
            transition: opacity 0.25s ease;
            cursor: pointer;
        }
        .image-wrapper img.loaded {
            opacity: 1;
        }
        .image-wrapper img.error-hidden {
            display: none;
        }

        /* 占位动画 */
        .image-wrapper .placeholder {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg,
                    var(--loading-shimmer) 0%,
                    #f0f0f0 40%,
                    var(--loading-shimmer) 80%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite ease-in-out;
            z-index: 0;
            pointer-events: none;
            min-height: 120px;
        }
        .image-wrapper.loaded .placeholder,
        .image-wrapper.error .placeholder {
            display: none;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 回到顶部 */
        .back-to-top {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 200;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--btn-bg);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s ease, transform 0.3s ease, background 0.2s ease;
            pointer-events: none;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .back-to-top.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .back-to-top:hover {
            background: var(--btn-hover);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        .back-to-top:active {
            transform: scale(0.92);
            transition: transform 0.1s ease;
        }
        .back-to-top svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #fff;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* 进度指示 */
        .progress-indicator {
            position: fixed;
            right: 28px;
            bottom: 80px;
            z-index: 199;
            font-size: 11px;
            color: var(--text-light);
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 12px;
            letter-spacing: 0.3px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }
        .progress-indicator.visible {
            opacity: 1;
        }

        @media (max-width: 900px) {
            .main-container {
                max-width: 100%;
                border-left: none;
                border-right: none;
                box-shadow: none;
                padding: 50px 0 20px;
            }
            .back-to-top {
                bottom: 18px;
                right: 14px;
                width: 38px;
                height: 38px;
            }
            .progress-indicator {
                right: 14px;
                bottom: 64px;
                font-size: 10px;
            }
            .top-bar {
                padding: 8px 12px;
            }
            .top-bar .info {
                font-size: 12px;
            }
            .top-bar .hint {
                display: none;
            }
        }

        @media (max-width: 500px) {
            .main-container {
                padding: 44px 0 16px;
            }
            .back-to-top {
                bottom: 12px;
                right: 10px;
                width: 34px;
                height: 34px;
            }
            .progress-indicator {
                right: 10px;
                bottom: 52px;
                font-size: 10px;
                padding: 4px 8px;
            }
        }
    </style>
</head>
<body>

    <!-- 顶部信息栏 -->
    <div class="top-bar" id="topBar">
        <span class="info">
            📄 共 <span class="count" id="imageCount">0</span> 张图片
        </span>
        <span class="divider"></span>
        <span class="hint">滚轮浏览 · 点击图片放大 · 空格键翻页</span>
    </div>

    <!-- 图片主容器 -->
    <div class="main-container" id="mainContainer">
        <div class="loading-screen" id="loadingScreen">
            <div class="loading-spinner"></div>
            <div>正在扫描图片文件夹…</div>
            <div class="info-text">images / 1 / 1.png , 2.png …</div>
        </div>
    </div>

    <!-- 进度指示 -->
    <div class="progress-indicator" id="progressIndicator">0 / 0</div>

    <!-- 回到顶部 -->
    <button class="back-to-top" id="backToTop" title="回到顶部" aria-label="回到顶部">
        <svg viewBox="0 0 24 24">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <script>
        (function() {
            // ==================== 配置 ====================
            const IMAGE_FOLDER = 'images/';
            const MAX_FOLDERS = 200;                 // 最多尝试的文件夹编号
            const MAX_EMPTY_FOLDERS = 10;            // 连续空文件夹数，超过则停止扫描
            const CONSECUTIVE_MISSING_FILES = 5;     // 文件夹内连续缺失文件数，超过则停止当前文件夹
            const OBSERVER_ROOT_MARGIN = '600px';
            const STORAGE_KEY_SCROLL = 'review_material_scroll_position';
            const STORAGE_KEY_COUNT = 'review_material_image_count';

            // ==================== DOM元素 ====================
            const mainContainer = document.getElementById('mainContainer');
            const loadingScreen = document.getElementById('loadingScreen');
            const topBar = document.getElementById('topBar');
            const backToTopBtn = document.getElementById('backToTop');
            const progressIndicator = document.getElementById('progressIndicator');
            const imageCountSpan = document.getElementById('imageCount');

            // ==================== 状态 ====================
            let totalImagesFound = 0;
            let loadedCount = 0;
            let imageWrappers = [];
            let observer = null;
            let scrollSaveTimer = null;
            let lastSavedScroll = 0;
            let scanCompleted = false;

            // ==================== 图片存在性测试 (返回 Promise<boolean>) ====================
            function imageExists(src) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => resolve(true);
                    img.onerror = () => resolve(false);
                    img.src = src;
                });
            }

            // ==================== 创建单个图片容器 ====================
            function createImageWrapper(path, globalIndex) {
                const wrapper = document.createElement('div');
                wrapper.className = 'image-wrapper';
                wrapper.dataset.index = globalIndex;
                wrapper.dataset.state = 'pending';

                const placeholder = document.createElement('div');
                placeholder.className = 'placeholder';
                wrapper.appendChild(placeholder);

                const img = document.createElement('img');
                img.dataset.src = path;
                img.alt = '复习资料 第' + globalIndex + '页';
                img.loading = 'lazy';
                wrapper.appendChild(img);

                // 点击/双击放大
                wrapper.addEventListener('click', () => {
                    if (wrapper.dataset.state === 'loaded') window.open(img.src, '_blank');
                });
                wrapper.addEventListener('dblclick', () => {
                    if (wrapper.dataset.state === 'loaded') window.open(img.src, '_blank');
                });

                img.addEventListener('load', () => {
                    wrapper.dataset.state = 'loaded';
                    wrapper.classList.add('loaded');
                    img.classList.add('loaded');
                    loadedCount++;
                    updateProgress();
                });

                img.addEventListener('error', () => {
                    wrapper.dataset.state = 'error';
                    wrapper.classList.add('error');
                    img.classList.add('error-hidden');
                    updateProgress();
                });

                return wrapper;
            }

            // ==================== 将一批新wrapper追加到DOM并加入懒加载观察 ====================
            function appendImageWrappers(newWrappers) {
                const fragment = document.createDocumentFragment();
                newWrappers.forEach(w => fragment.appendChild(w));
                mainContainer.appendChild(fragment);

                // 新的wrapper加入观察器
                if (observer) {
                    newWrappers.forEach(w => {
                        if (w.dataset.state === 'pending') {
                            observer.observe(w);
                        }
                    });
                }
                imageWrappers.push(...newWrappers);
                totalImagesFound = imageWrappers.length;
                updateProgress();
            }

            // ==================== 扫描文件夹并动态添加图片 ====================
            async function scanAndAppendImages() {
                let globalIndex = 0;
                let emptyFolderCount = 0;
                const newWrappersBatch = []; // 积累一个文件夹的wrapper后一次性追加

                for (let folder = 1; folder <= MAX_FOLDERS; folder++) {
                    // 先检测文件夹下的第一张图片是否存在
                    const firstPath = `${IMAGE_FOLDER}${folder}/1.png`;
                    const firstExists = await imageExists(firstPath);

                    if (!firstExists) {
                        emptyFolderCount++;
                        // 连续多个空文件夹则停止扫描
                        if (emptyFolderCount >= MAX_EMPTY_FOLDERS) {
                            console.log(`连续 ${MAX_EMPTY_FOLDERS} 个空文件夹，停止扫描。`);
                            break;
                        }
                        continue; // 跳过该文件夹，尝试下一个
                    }

                    // 文件夹存在，重置空文件夹计数
                    emptyFolderCount = 0;

                    // 处理当前文件夹内的所有图片
                    let fileIndex = 1;
                    let consecutiveMissing = 0;

                    while (consecutiveMissing < CONSECUTIVE_MISSING_FILES) {
                        const path = `${IMAGE_FOLDER}${folder}/${fileIndex}.png`;
                        const exists = await imageExists(path);
                        if (exists) {
                            globalIndex++;
                            const wrapper = createImageWrapper(path, globalIndex);
                            newWrappersBatch.push(wrapper);
                            consecutiveMissing = 0;
                        } else {
                            consecutiveMissing++;
                        }
                        fileIndex++;
                    }

                    // 每扫描完一个文件夹，立即追加到页面
                    if (newWrappersBatch.length > 0) {
                        appendImageWrappers(newWrappersBatch);
                        newWrappersBatch.length = 0; // 清空
                        // 短暂让出主线程，让界面更新
                        await new Promise(resolve => setTimeout(resolve, 10));
                    }
                }

                scanCompleted = true;
                // 隐藏加载提示（如果还在）
                if (loadingScreen && loadingScreen.parentNode) {
                    loadingScreen.style.display = 'none';
                }
                updateProgress();
                // 恢复滚动位置
                setTimeout(restoreScrollPosition, 200);
                console.log('📚 扫描完成，共找到 ' + totalImagesFound + ' 张图片');
            }

            // ==================== 懒加载观察器 ====================
            function setupObserver() {
                if (!('IntersectionObserver' in window)) {
                    // 降级：直接加载所有现有图片
                    imageWrappers.forEach(w => triggerImageLoad(w));
                    return;
                }

                observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const wrapper = entry.target;
                            if (wrapper.dataset.state === 'pending') {
                                triggerImageLoad(wrapper);
                            }
                            if (wrapper.dataset.state !== 'pending') {
                                observer.unobserve(wrapper);
                            }
                        }
                    });
                }, {
                    root: null,
                    rootMargin: OBSERVER_ROOT_MARGIN,
                    threshold: 0.01
                });

                // 初始已有的wrapper加入观察（后续追加的会在appendImageWrappers中加入）
                imageWrappers.forEach(w => observer.observe(w));
            }

            function triggerImageLoad(wrapper) {
                if (wrapper.dataset.state !== 'pending') return;
                wrapper.dataset.state = 'loading';
                const img = wrapper.querySelector('img');
                if (img && img.dataset.src) {
                    img.src = img.dataset.src;
                }
            }

            // ==================== 进度更新 ====================
            function updateProgress() {
                imageCountSpan.textContent = totalImagesFound || loadedCount;
                const current = loadedCount;
                progressIndicator.textContent = current + ' / ' + (totalImagesFound || '?');
            }

            // ==================== 滚动位置保存与恢复 ====================
            function saveScrollPosition() {
                const scrollY = window.scrollY;
                if (Math.abs(scrollY - lastSavedScroll) > 50) {
                    lastSavedScroll = scrollY;
                    try {
                        localStorage.setItem(STORAGE_KEY_SCROLL, scrollY);
                        if (totalImagesFound > 0) {
                            localStorage.setItem(STORAGE_KEY_COUNT, totalImagesFound);
                        }
                    } catch (e) {}
                }
            }

            function restoreScrollPosition() {
                try {
                    const savedScroll = localStorage.getItem(STORAGE_KEY_SCROLL);
                    if (savedScroll !== null) {
                        const targetScroll = parseInt(savedScroll, 10);
                        if (!isNaN(targetScroll) && targetScroll > 0) {
                            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                            const clampedScroll = Math.min(targetScroll, maxScroll);
                            window.scrollTo({ top: clampedScroll, behavior: 'instant' });
                            lastSavedScroll = clampedScroll;
                        }
                    }
                } catch (e) {}
            }

            // ==================== 回到顶部按钮 ====================
            function updateBackToTopVisibility() {
                const scrollY = window.scrollY;
                const shouldShow = scrollY > window.innerHeight * 0.8;
                backToTopBtn.classList.toggle('visible', shouldShow);
                progressIndicator.classList.toggle('visible', shouldShow);

                if (totalImagesFound > 0 && imageWrappers.length > 0) {
                    const viewportMiddle = scrollY + window.innerHeight / 2;
                    let closestIndex = 1;
                    let closestDistance = Infinity;
                    imageWrappers.forEach(w => {
                        if (w.dataset.state === 'loaded' || w.dataset.state === 'loading') {
                            const rect = w.getBoundingClientRect();
                            const wrapperMiddle = rect.top + rect.height / 2 + scrollY;
                            const dist = Math.abs(viewportMiddle - wrapperMiddle);
                            if (dist < closestDistance) {
                                closestDistance = dist;
                                closestIndex = parseInt(w.dataset.index);
                            }
                        }
                    });
                    progressIndicator.textContent = closestIndex + ' / ' + totalImagesFound;
                }
            }

            backToTopBtn.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // ==================== 顶部栏显隐 ====================
            let lastScrollYForBar = 0;
            let barHidden = false;
            function updateTopBarVisibility() {
                const scrollY = window.scrollY;
                if (scrollY < 60) {
                    topBar.classList.remove('hidden');
                    barHidden = false;
                } else if (scrollY > lastScrollYForBar + 30 && !barHidden) {
                    topBar.classList.add('hidden');
                    barHidden = true;
                } else if (scrollY < lastScrollYForBar - 20 && barHidden) {
                    topBar.classList.remove('hidden');
                    barHidden = false;
                }
                lastScrollYForBar = scrollY;
            }

            // ==================== 键盘快捷键 ====================
            function setupKeyboardShortcuts() {
                document.addEventListener('keydown', (e) => {
                    if (e.target.closest('input, textarea, [contenteditable]')) return;
                    if (e.code === 'Space') {
                        e.preventDefault();
                        const amount = window.innerHeight * 0.8;
                        window.scrollBy({
                            top: e.shiftKey ? -amount : amount,
                            behavior: 'smooth'
                        });
                    } else if (e.code === 'Home') {
                        e.preventDefault();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } else if (e.code === 'End') {
                        e.preventDefault();
                        window.scrollTo({
                            top: document.documentElement.scrollHeight,
                            behavior: 'smooth'
                        });
                    }
                });
            }

            // ==================== 滚动事件 ====================
            let scrollTicking = false;
            function onScroll() {
                if (!scrollTicking) {
                    requestAnimationFrame(() => {
                        updateBackToTopVisibility();
                        updateTopBarVisibility();
                        if (scrollSaveTimer) clearTimeout(scrollSaveTimer);
                        scrollSaveTimer = setTimeout(saveScrollPosition, 800);
                        scrollTicking = false;
                    });
                    scrollTicking = true;
                }
                lastSavedScroll = window.scrollY;
            }

            window.addEventListener('beforeunload', () => {
                try {
                    localStorage.setItem(STORAGE_KEY_SCROLL, window.scrollY);
                    if (totalImagesFound > 0) localStorage.setItem(STORAGE_KEY_COUNT, totalImagesFound);
                } catch (e) {}
            });

            document.addEventListener('visibilitychange', () => {
                if (document.hidden) saveScrollPosition();
            });

            // ==================== 启动 ====================
            async function init() {
                setupKeyboardShortcuts();
                window.addEventListener('scroll', onScroll, { passive: true });
                updateBackToTopVisibility();
                updateTopBarVisibility();

                // 先设置懒加载观察器（后续动态添加的wrapper也能被观察到）
                setupObserver();

                // 开始扫描并动态追加图片
                scanAndAppendImages().catch(err => {
                    console.error('扫描出错:', err);
                    if (loadingScreen && loadingScreen.parentNode) {
                        loadingScreen.innerHTML = '<div>❌ 扫描图片时出错，请刷新重试</div>';
                    }
                });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
