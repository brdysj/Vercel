<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自然之美 - 第二页</title>
    <style>
        :root {
            --bg: #f5faf8;
            --card-bg: #ffffff;
            --text: #2d3748;
            --green: #00b894;
            --green-light: #55efc4;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.07);
            --shadow-hover: 0 18px 50px rgba(0, 0, 0, 0.13);
            --radius: 20px;
            --transition: 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: linear-gradient(160deg, #eafaf4 0%, #f5faf8 30%, #eaf7f3 60%, #f8faf5 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: -150px;
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, rgba(0, 184, 148, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -180px;
            right: -130px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(85, 239, 196, 0.09) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 750px;
            text-align: center;
        }

        .page-badge {
            display: inline-block;
            background: rgba(0, 184, 148, 0.1);
            color: #00b894;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 8px 22px;
            border-radius: 50px;
            margin-bottom: 18px;
            backdrop-filter: blur(4px);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #1a202c;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }
        h1 .highlight {
            background: linear-gradient(135deg, #00b894, #55efc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.15rem;
            color: #5a6c7d;
            margin-bottom: 40px;
            font-weight: 400;
            line-height: 1.6;
        }

        /* 内容展示区 */
        .showcase {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 40px 30px;
            box-shadow: var(--shadow);
            margin-bottom: 36px;
            border-top: 5px solid #00b894;
            transition: var(--transition);
        }
        .showcase .emoji-big {
            font-size: 5rem;
            display: block;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-16px);
            }
        }
        .showcase h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 8px;
        }
        .showcase p {
            color: #5a6c7d;
            line-height: 1.7;
            font-size: 1rem;
            max-width: 500px;
            margin: 0 auto;
        }

        /* 导航卡片 */
        .nav-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) {
            .nav-cards {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            h1 {
                font-size: 2rem;
            }
        }

        .nav-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px 20px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.05);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 16px;
            border: 2px solid transparent;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: #dfe6e9;
        }
        .nav-card:active {
            transform: scale(0.95);
            transition: 0.15s ease;
        }
        .nav-card .nav-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            flex-shrink: 0;
            transition: var(--transition);
        }
        .nav-card.home-card .nav-icon {
            background: rgba(108, 92, 231, 0.1);
        }
        .nav-card.page3-card .nav-icon {
            background: rgba(253, 203, 110, 0.18);
        }
        .nav-card:hover .nav-icon {
            transform: scale(1.15) rotate(-8deg);
        }
        .nav-card .nav-info h4 {
            font-size: 1.05rem;
            font-weight: 700;
            color: #1a202c;
            margin: 0 0 2px;
        }
        .nav-card .nav-info span {
            font-size: 0.85rem;
            color: #8b9aab;
        }
        .nav-card .nav-arrow {
            margin-left: auto;
            font-size: 1.3rem;
            color: #b2bec3;
            transition: var(--transition);
        }
        .nav-card:hover .nav-arrow {
            color: #00b894;
            transform: translateX(4px);
        }

        .footer-note {
            font-size: 0.85rem;
            color: #a0aec0;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="page-badge">🌿 第 2 页 · 自然之美</span>
        <h1>沉浸<span class="highlight">自然</span>之境</h1>
        <p class="subtitle">聆听风的声音，感受大地的脉搏</p>

        <div class="showcase">
            <span class="emoji-big">🏔️</span>
            <h2>山川 · 河流 · 森林</h2>
            <p>大自然是最伟大的艺术家。每一片叶子、每一缕阳光，都在诉说生命的故事。放慢脚步，让心灵回归最纯净的状态。</p>
        </div>

        <p style="font-size:0.95rem;color:#5a6c7d;margin-bottom:18px;font-weight:600;">
            🔗 点击下方卡片跳转至其他页面
        </p>

        <div class="nav-cards">
            <!-- 跳转回首页 -->
            <a href="index.html" class="nav-card home-card" title="返回首页">
                <div class="nav-icon">🏠</div>
                <div class="nav-info">
                    <h4>返回首页</h4>
                    <span>探索世界主页</span>
                </div>
                <span class="nav-arrow">→</span>
            </a>

            <!-- 跳转到页面3 -->
            <a href="page3.html" class="nav-card page3-card" title="前往创意空间">
                <div class="nav-icon">🎨</div>
                <div class="nav-info">
                    <h4>创意空间</h4>
                    <span>灵感与设计</span>
                </div>
                <span class="nav-arrow">→</span>
            </a>
        </div>

        <p class="footer-note">💡 你在第2页 · 点击卡片即可跳转</p>
    </div>
</body>
</html>
