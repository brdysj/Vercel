<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复习资料浏览</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --container-bg: #ffffff;
            --text: #555;
            --text-light: #999;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06);
            --accent: #4a6cf7;
            --btn-bg: rgba(0, 0, 0, 0.5);
            --btn-hover: rgba(0, 0, 0, 0.7);
            --loading-shimmer: #e8e8e8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
            /* 给滚动条留空间，避免图片宽度变化 */
            overflow-y: scroll;
        }

        /* ========== 顶部信息栏 ========== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: transform 0.3s ease, opacity 0.3s ease;
            pointer-events: none;
        }
        .top-bar.hidden {
            transform: translateY(-100%);
            opacity: 0;
        }
        .top-bar .info {
            font-size: 13px;
            color: var(--text);
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .top-bar .count {
            font-weight: 600;
            color: var(--accent);
            font-size: 15px;
        }
        .top-bar .divider {
            width: 1px;
            height: 14px;
            background: #ddd;
            border-radius: 1px;
        }
        .top-bar .hint {
            font-size: 11px;
            color: var(--text-light);
            letter-spacing: 0.2px;
        }

        /* ========== 主容器 ========== */
        .main-container {
            max-width: 850px;
            margin: 0 auto;
            padding: 60px 0 40px;
            /* 顶部留空给top-bar */
            background: var(--container-bg);
            box-shadow: var(--shadow);
            min-height: 100vh;
            border-left: 1px solid rgba(0, 0, 0, 0.03);
            border-right: 1px solid rgba(0, 0, 0, 0.03);
        }

        /* ========== 图片容器 ========== */
        .image-wrapper {
            position: relative;
            width: 100%;
            /* 图片之间无缝 */;
            line-height: 0;
            font-size: 0;
            min-height: 8px;
            /* 微小占位，让Observer能检测到 */;
            background: transparent;
            overflow: hidden;
        }

        .image-wrapper img {
            display: block;
            width: 100%;
            height: auto;
            border: none;
            outline: none;
            /* 加载前透明 */;
            opacity: 0;
            transition: opacity 0.25s ease;
            cursor: pointer;
            /* 让图片可点击放大 */;
        }

        .image-wrapper img.loaded {
            opacity: 1;
        }

        .image-wrapper img.error-hidden {
            display: none;
        }

        /* ========== 加载占位动画 ========== */
        .image-wrapper .placeholder {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg,
                    var(--loading-shimmer) 0%,
                    #f0f0f0 40%,
                    var(--loading-shimmer) 80%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite ease-in-out;
            z-index: 0;
            pointer-events: none;
            min-height: 120px;
            /* 预估最小高度 */;
        }

        .image-wrapper.loaded .placeholder,
        .image-wrapper.error .placeholder {
            display: none;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        /* ========== 回到顶部按钮 ========== */
        .back-to-top {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 200;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--btn-bg);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s ease, transform 0.3s ease, background 0.2s ease;
            pointer-events: none;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .back-to-top.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .back-to-top:hover {
            background: var(--btn-hover);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        .back-to-top:active {
            transform: scale(0.92);
            transition: transform 0.1s ease;
        }
        .back-to-top svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #fff;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ========== 进度指示器（滚动条附近） ========== */
        .progress-indicator {
            position: fixed;
            right: 28px;
            bottom: 80px;
            z-index: 199;
            font-size: 11px;
            color: var(--text-light);
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 12px;
            letter-spacing: 0.3px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }
        .progress-indicator.visible {
            opacity: 1;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 900px) {
            .main-container {
                max-width: 100%;
                border-left: none;
                border-right: none;
                box-shadow: none;
                padding: 50px 0 20px;
            }
            .back-to-top {
                bottom: 18px;
                right: 14px;
                width: 38px;
                height: 38px;
            }
            .progress-indicator {
                right: 14px;
                bottom: 64px;
                font-size: 10px;
            }
            .top-bar {
                padding: 8px 12px;
            }
            .top-bar .info {
                font-size: 12px;
            }
            .top-bar .hint {
                display: none;
            }
        }

        @media (max-width: 500px) {
            .main-container {
                padding: 44px 0 16px;
            }
            .back-to-top {
                bottom: 12px;
                right: 10px;
                width: 34px;
                height: 34px;
            }
            .progress-indicator {
                right: 10px;
                bottom: 52px;
                font-size: 10px;
                padding: 4px 8px;
            }
        }
    </style>
</head>
<body>

    <!-- ==================== 顶部信息栏 ==================== -->
    <div class="top-bar" id="topBar">
        <span class="info">
            📄 共 <span class="count" id="imageCount">--</span> 张图片
        </span>
        <span class="divider"></span>
        <span class="hint">滚轮浏览 · 点击图片放大 · 空格键翻页</span>
    </div>

    <!-- ==================== 图片主容器 ==================== -->
    <div class="main-container" id="mainContainer">
        <!-- 图片将由JS动态生成 -->
    </div>

    <!-- ==================== 进度指示 ==================== -->
    <div class="progress-indicator" id="progressIndicator">1 / --</div>

    <!-- ==================== 回到顶部按钮 ==================== -->
    <button class="back-to-top" id="backToTop" title="回到顶部" aria-label="回到顶部">
        <svg viewBox="0 0 24 24">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <script>
        (function() {
            // ==================== 配置 ====================
            // 图片存放在 images/ 文件夹，命名为 1.png, 2.png, 3.png, ...
            // 如果你的图片数量超过下面设置的值，请调大 MAX_IMAGES
            const MAX_IMAGES = 500;
            const IMAGE_FOLDER = 'images/';
            const IMAGE_EXTENSION = '.png';
            // Observer 提前加载距离（px），本地文件加载快，500px足够
            const OBSERVER_ROOT_MARGIN = '600px';
            // localStorage 键名
            const STORAGE_KEY_SCROLL = 'review_material_scroll_position';
            const STORAGE_KEY_COUNT = 'review_material_image_count';

            // ==================== DOM元素 ====================
            const mainContainer = document.getElementById('mainContainer');
            const topBar = document.getElementById('topBar');
            const backToTopBtn = document.getElementById('backToTop');
            const progressIndicator = document.getElementById('progressIndicator');
            const imageCountSpan = document.getElementById('imageCount');

            // ==================== 状态 ====================
            let totalImagesFound = 0;
            let loadedCount = 0;
            let errorCount = 0;
            let consecutiveErrors = 0;
            const MAX_CONSECUTIVE_ERRORS = 8; // 连续失败这么多张就停止尝试
            let allDetectionDone = false;
            let imageWrappers = []; // 存储所有wrapper引用
            let observer = null;
            let scrollSaveTimer = null;
            let lastSavedScroll = 0;

            // ==================== 创建单个图片容器 ====================
            function createImageWrapper(index) {
                const wrapper = document.createElement('div');
                wrapper.className = 'image-wrapper';
                wrapper.dataset.index = index;
                wrapper.dataset.state = 'pending'; // pending | loading | loaded | error

                // 占位动画
                const placeholder = document.createElement('div');
                placeholder.className = 'placeholder';
                wrapper.appendChild(placeholder);

                // 图片元素
                const img = document.createElement('img');
                img.dataset.src = IMAGE_FOLDER + index + IMAGE_EXTENSION;
                img.alt = '复习资料 第' + index + '页';
                img.loading = 'lazy'; // 浏览器原生懒加载作为后备
                // 初始不设src，由Observer触发
                wrapper.appendChild(img);

                // 点击放大
                wrapper.addEventListener('click', function(e) {
                    if (wrapper.dataset.state === 'loaded') {
                        window.open(img.src, '_blank');
                    }
                });
                // 双击也放大（兼容不同习惯）
                wrapper.addEventListener('dblclick', function(e) {
                    if (wrapper.dataset.state === 'loaded') {
                        window.open(img.src, '_blank');
                    }
                });

                // 图片加载成功
                img.addEventListener('load', function() {
                    wrapper.dataset.state = 'loaded';
                    wrapper.classList.add('loaded');
                    img.classList.add('loaded');
                    loadedCount++;
                    consecutiveErrors = 0;
                    updateProgress();
                });

                // 图片加载失败
                img.addEventListener('error', function() {
                    wrapper.dataset.state = 'error';
                    wrapper.classList.add('error');
                    img.classList.add('error-hidden');
                    errorCount++;
                    consecutiveErrors++;
                    // 如果已经检测完成且连续失败很多，后续可能都不存在
                    // 但不在这里停止，因为可能是偶发的文件损坏
                    updateProgress();

                    // 如果连续失败超过阈值且还在检测阶段，标记后续无需再试
                    if (!allDetectionDone && consecutiveErrors >= MAX_CONSECUTIVE_ERRORS && index > 5) {
                        // 很可能后面都没有了
                        allDetectionDone = true;
                        totalImagesFound = loadedCount;
                        imageCountSpan.textContent = totalImagesFound;
                        updateProgress();
                        // 移除后面还没加载的wrapper
                        cleanupExtraWrappers(index + 1);
                    }
                });

                return wrapper;
            }

            // ==================== 清理多余的wrapper ====================
            function cleanupExtraWrappers(fromIndex) {
                // 移除fromIndex及之后的所有wrapper（它们还没有被添加到DOM或者已经在DOM中）
                const wrappersToRemove = imageWrappers.filter(w => parseInt(w.dataset.index) >= fromIndex);
                wrappersToRemove.forEach(w => {
                    if (w.parentNode) {
                        w.parentNode.removeChild(w);
                    }
                    if (observer && w.dataset.observed === 'true') {
                        observer.unobserve(w);
                    }
                });
                // 更新imageWrappers数组
                imageWrappers = imageWrappers.filter(w => parseInt(w.dataset.index) < fromIndex);
                // 更新totalImagesFound
                if (allDetectionDone) {
                    totalImagesFound = imageWrappers.filter(w => w.dataset.state === 'loaded').length;
                    imageCountSpan.textContent = totalImagesFound;
                }
            }

            // ==================== 初始化所有图片容器 ====================
            function initAllImageWrappers() {
                const fragment = document.createDocumentFragment();
                for (let i = 1; i <= MAX_IMAGES; i++) {
                    const wrapper = createImageWrapper(i);
                    imageWrappers.push(wrapper);
                    fragment.appendChild(wrapper);
                }
                mainContainer.appendChild(fragment);
            }

            // ==================== Intersection Observer ====================
            function setupObserver() {
                // 使用Intersection Observer进行懒加载
                if (!('IntersectionObserver' in window)) {
                    // 不支持的话直接全部加载
                    loadAllImages();
                    return;
                }

                observer = new IntersectionObserver(function(entries) {
                    entries.forEach(function(entry) {
                        if (entry.isIntersecting) {
                            const wrapper = entry.target;
                            if (wrapper.dataset.state === 'pending') {
                                triggerImageLoad(wrapper);
                            }
                            // 加载后取消观察
                            if (wrapper.dataset.state !== 'pending') {
                                observer.unobserve(wrapper);
                                wrapper.dataset.observed = 'false';
                            }
                        }
                    });
                }, {
                    root: null,
                    rootMargin: OBSERVER_ROOT_MARGIN,
                    threshold: 0.01
                });

                // 观察所有wrapper
                imageWrappers.forEach(function(wrapper) {
                    observer.observe(wrapper);
                    wrapper.dataset.observed = 'true';
                });
            }

            function triggerImageLoad(wrapper) {
                if (wrapper.dataset.state !== 'pending') return;
                wrapper.dataset.state = 'loading';
                const img = wrapper.querySelector('img');
                if (img && img.dataset.src) {
                    img.src = img.dataset.src;
                }
            }

            function loadAllImages() {
                imageWrappers.forEach(function(wrapper) {
                    triggerImageLoad(wrapper);
                });
            }

            // ==================== 检测实际图片数量 ====================
            function detectTotalImageCount() {
                // 主动加载前若干张来判断总数
                // 对于连续编号，我们加载前面的图片，找到连续失败点
                // 同时并行检测，加快速度
                const BATCH_SIZE = 30;
                let currentBatchStart = 1;
                let stopDetection = false;

                function detectBatch() {
                    if (stopDetection || currentBatchStart > MAX_IMAGES) {
                        finalizeDetection();
                        return;
                    }

                    const batchEnd = Math.min(currentBatchStart + BATCH_SIZE - 1, MAX_IMAGES);
                    let batchLoaded = 0;
                    let batchErrors = 0;
                    let firstErrorInBatch = null;
                    const batchWrappers = imageWrappers.filter(w => {
                        const idx = parseInt(w.dataset.index);
                        return idx >= currentBatchStart && idx <= batchEnd && w.dataset.state === 'pending';
                    });

                    if (batchWrappers.length === 0) {
                        // 全部已经处理过，继续下一批
                        currentBatchStart = batchEnd + 1;
                        detectBatch();
                        return;
                    }

                    let completedInBatch = 0;
                    const totalInBatch = batchWrappers.length;

                    batchWrappers.forEach(function(wrapper) {
                        const img = wrapper.querySelector('img');
                        const index = parseInt(wrapper.dataset.index);

                        // 临时加载来检测
                        const testImg = new Image();
                        testImg.onload = function() {
                            batchLoaded++;
                            completedInBatch++;
                            consecutiveErrors = 0;
                            if (!stopDetection && wrapper.dataset.state === 'pending') {
                                // 标记为存在，但不触发完整加载（留给Observer）
                                // 实际上已经加载了，可以直接使用
                                wrapper.dataset.state = 'loading';
                                img.src = img.dataset.src;
                                // 等load事件触发
                            }
                            checkBatchComplete();
                        };
                        testImg.onerror = function() {
                            batchErrors++;
                            completedInBatch++;
                            if (firstErrorInBatch === null) {
                                firstErrorInBatch = index;
                            }
                            consecutiveErrors++;
                            // 标记为error
                            wrapper.dataset.state = 'error';
                            wrapper.classList.add('error');
                            const imgEl = wrapper.querySelector('img');
                            if (imgEl) imgEl.classList.add('error-hidden');
                            errorCount++;
                            checkBatchComplete();
                        };
                        testImg.src = img.dataset.src;
                    });

                    function checkBatchComplete() {
                        if (completedInBatch >= totalInBatch) {
                            // 该批次完成
                            if (firstErrorInBatch !== null && consecutiveErrors >= MAX_CONSECUTIVE_ERRORS) {
                                // 连续失败，认为后面没有了
                                stopDetection = true;
                                allDetectionDone = true;
                                totalImagesFound = imageWrappers.filter(
                                    w => w.dataset.state === 'loaded' || w.dataset.state === 'loading'
                                ).length;
                                // 重新计算：实际是已加载+加载中的
                                totalImagesFound = imageWrappers.filter(w => {
                                    const s = w.dataset.state;
                                    return s === 'loaded' || s === 'loading';
                                }).length;
                                imageCountSpan.textContent = totalImagesFound;
                                updateProgress();
                                cleanupExtraWrappers(firstErrorInBatch);
                                finalizeDetection();
                                return;
                            }
                            currentBatchStart = batchEnd + 1;
                            if (!stopDetection) {
                                // 短暂延迟后继续下一批，避免阻塞
                                setTimeout(detectBatch, 50);
                            }
                        }
                    }
                }

                function finalizeDetection() {
                    if (allDetectionDone) return;
                    allDetectionDone = true;
                    // 统计实际图片数
                    totalImagesFound = imageWrappers.filter(w => {
                        const s = w.dataset.state;
                        return s === 'loaded' || s === 'loading';
                    }).length;
                    if (totalImagesFound === 0) {
                        // 可能都还没加载完，等一等再统计
                        setTimeout(function() {
                            totalImagesFound = imageWrappers.filter(w => {
                                const s = w.dataset.state;
                                return s === 'loaded' || s === 'loading';
                            }).length;
                            imageCountSpan.textContent = totalImagesFound || '?';
                            updateProgress();
                        }, 1500);
                    }
                    imageCountSpan.textContent = totalImagesFound || '?';
                    updateProgress();
                    // 恢复滚动位置
                    setTimeout(restoreScrollPosition, 300);
                }

                // 开始检测
                setTimeout(detectBatch, 100);
            }

            // ==================== 更新进度 ====================
            function updateProgress() {
                const total = totalImagesFound || MAX_IMAGES;
                const current = loadedCount;
                imageCountSpan.textContent = totalImagesFound || (allDetectionDone ? loadedCount : '...');
                progressIndicator.textContent = Math.min(current, total) + ' / ' + (totalImagesFound || '?');
            }

            // ==================== 滚动位置保存与恢复 ====================
            function saveScrollPosition() {
                const scrollY = window.scrollY;
                if (Math.abs(scrollY - lastSavedScroll) > 50) {
                    lastSavedScroll = scrollY;
                    try {
                        localStorage.setItem(STORAGE_KEY_SCROLL, scrollY);
                        if (totalImagesFound > 0) {
                            localStorage.setItem(STORAGE_KEY_COUNT, totalImagesFound);
                        }
                    } catch (e) {
                        // localStorage 不可用
                    }
                }
            }

            function restoreScrollPosition() {
                try {
                    const savedScroll = localStorage.getItem(STORAGE_KEY_SCROLL);
                    const savedCount = localStorage.getItem(STORAGE_KEY_COUNT);
                    if (savedScroll !== null) {
                        const targetScroll = parseInt(savedScroll, 10);
                        if (!isNaN(targetScroll) && targetScroll > 0) {
                            // 延迟恢复，等图片加载
                            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                            const clampedScroll = Math.min(targetScroll, maxScroll);
                            window.scrollTo({
                                top: clampedScroll,
                                behavior: 'instant'
                            });
                            lastSavedScroll = clampedScroll;
                        }
                    }
                } catch (e) {
                    // 忽略
                }
            }

            // ==================== 回到顶部按钮 ====================
            function updateBackToTopVisibility() {
                const scrollY = window.scrollY;
                const shouldShow = scrollY > window.innerHeight * 0.8;
                if (shouldShow) {
                    backToTopBtn.classList.add('visible');
                    progressIndicator.classList.add('visible');
                } else {
                    backToTopBtn.classList.remove('visible');
                    progressIndicator.classList.remove('visible');
                }

                // 更新进度指示器
                if (totalImagesFound > 0) {
                    const viewportMiddle = scrollY + window.innerHeight / 2;
                    let closestIndex = 1;
                    let closestDistance = Infinity;
                    imageWrappers.forEach(function(wrapper) {
                        if (wrapper.dataset.state === 'loaded' || wrapper.dataset.state === 'loading') {
                            const rect = wrapper.getBoundingClientRect();
                            const wrapperMiddle = rect.top + rect.height / 2 + scrollY;
                            const distance = Math.abs(viewportMiddle - wrapperMiddle);
                            if (distance < closestDistance) {
                                closestDistance = distance;
                                closestIndex = parseInt(wrapper.dataset.index);
                            }
                        }
                    });
                    progressIndicator.textContent = closestIndex + ' / ' + totalImagesFound;
                }
            }

            backToTopBtn.addEventListener('click', function() {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });

            // ==================== 顶部栏显隐 ====================
            let lastScrollYForBar = 0;
            let barHidden = false;

            function updateTopBarVisibility() {
                const scrollY = window.scrollY;
                if (scrollY < 60) {
                    // 在顶部附近，始终显示
                    topBar.classList.remove('hidden');
                    barHidden = false;
                } else if (scrollY > lastScrollYForBar + 30 && !barHidden) {
                    // 向下滚动，隐藏
                    topBar.classList.add('hidden');
                    barHidden = true;
                } else if (scrollY < lastScrollYForBar - 20 && barHidden) {
                    // 向上滚动，显示
                    topBar.classList.remove('hidden');
                    barHidden = false;
                }
                lastScrollYForBar = scrollY;
            }

            // ==================== 键盘快捷键 ====================
            function setupKeyboardShortcuts() {
                document.addEventListener('keydown', function(e) {
                    // 空格键：向下滚动约80%视口高度
                    if (e.code === 'Space' && !e.target.closest('input, textarea, [contenteditable]')) {
                        e.preventDefault();
                        const scrollAmount = window.innerHeight * 0.8;
                        if (e.shiftKey) {
                            // Shift+空格：向上滚动
                            window.scrollBy({
                                top: -scrollAmount,
                                behavior: 'smooth'
                            });
                        } else {
                            window.scrollBy({
                                top: scrollAmount,
                                behavior: 'smooth'
                            });
                        }
                    }
                    // Home键：回到顶部
                    if (e.code === 'Home' && !e.target.closest('input, textarea, [contenteditable]')) {
                        e.preventDefault();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                    // End键：滚动到底部
                    if (e.code === 'End' && !e.target.closest('input, textarea, [contenteditable]')) {
                        e.preventDefault();
                        window.scrollTo({
                            top: document.documentElement.scrollHeight,
                            behavior: 'smooth'
                        });
                    }
                });
            }

            // ==================== 滚动事件监听（节流） ====================
            let scrollTicking = false;

            function onScroll() {
                if (!scrollTicking) {
                    requestAnimationFrame(function() {
                        updateBackToTopVisibility();
                        updateTopBarVisibility();
                        // 保存滚动位置（防抖）
                        if (scrollSaveTimer) clearTimeout(scrollSaveTimer);
                        scrollSaveTimer = setTimeout(saveScrollPosition, 800);
                        scrollTicking = false;
                    });
                    scrollTicking = true;
                }
                // 即时保存（用于beforeunload）
                lastSavedScroll = window.scrollY;
            }

            // ==================== 页面卸载时保存 ====================
            window.addEventListener('beforeunload', function() {
                try {
                    localStorage.setItem(STORAGE_KEY_SCROLL, window.scrollY);
                    if (totalImagesFound > 0) {
                        localStorage.setItem(STORAGE_KEY_COUNT, totalImagesFound);
                    }
                } catch (e) {}
            });

            // ==================== 页面可见性变化时保存 ====================
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    saveScrollPosition();
                }
            });

            // ==================== 启动 ====================
            function init() {
                initAllImageWrappers();
                setupObserver();
                setupKeyboardShortcuts();
                window.addEventListener('scroll', onScroll, { passive: true });
                updateBackToTopVisibility();
                updateTopBarVisibility();

                // 开始检测实际图片数量
                detectTotalImageCount();

                // 尝试恢复滚动位置
                setTimeout(restoreScrollPosition, 500);

                // 初始显示
                imageCountSpan.textContent = '...';
                progressIndicator.textContent = '加载中...';

                console.log('📚 复习资料浏览页面已就绪');
                console.log('   - 图片路径: ' + IMAGE_FOLDER + '1' + IMAGE_EXTENSION + ' ~ ' + IMAGE_FOLDER + MAX_IMAGES +
                    IMAGE_EXTENSION);
                console.log('   - 懒加载提前量: ' + OBSERVER_ROOT_MARGIN);
                console.log('   - 空格键翻页 · 点击图片放大 · 滚动位置自动记忆');
            }

            // DOM加载完成后启动
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
