<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创意空间 - 第三页</title>
    <style>
        :root {
            --bg: #fffdf7;
            --card-bg: #ffffff;
            --text: #2d3748;
            --gold: #f0a500;
            --gold-light: #fdcb6e;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.07);
            --shadow-hover: 0 18px 50px rgba(0, 0, 0, 0.13);
            --radius: 20px;
            --transition: 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: linear-gradient(160deg, #fffdf7 0%, #fffefb 30%, #fff9f0 60%, #fefdf8 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -160px;
            right: -140px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(253, 203, 110, 0.13) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -170px;
            left: -120px;
            width: 480px;
            height: 480px;
            background: radial-gradient(circle, rgba(240, 165, 0, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 750px;
            text-align: center;
        }

        .page-badge {
            display: inline-block;
            background: rgba(240, 165, 0, 0.1);
            color: #c78500;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 8px 22px;
            border-radius: 50px;
            margin-bottom: 18px;
            backdrop-filter: blur(4px);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #1a202c;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }
        h1 .highlight {
            background: linear-gradient(135deg, #f0a500, #fdcb6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.15rem;
            color: #5a6c7d;
            margin-bottom: 40px;
            font-weight: 400;
            line-height: 1.6;
        }

        /* 创意展示区 */
        .showcase {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 40px 30px;
            box-shadow: var(--shadow);
            margin-bottom: 36px;
            border-top: 5px solid #fdcb6e;
            transition: var(--transition);
        }
        .showcase .emoji-big {
            font-size: 5rem;
            display: block;
            margin-bottom: 10px;
            animation: pulse-glow 2.5s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 8px rgba(253, 203, 110, 0.3));
            }
            50% {
                transform: scale(1.08);
                filter: drop-shadow(0 0 22px rgba(253, 203, 110, 0.55));
            }
        }
        .showcase h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 8px;
        }
        .showcase p {
            color: #5a6c7d;
            line-height: 1.7;
            font-size: 1rem;
            max-width: 500px;
            margin: 0 auto;
        }

        /* 导航卡片 */
        .nav-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) {
            .nav-cards {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            h1 {
                font-size: 2rem;
            }
        }

        .nav-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px 20px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.05);
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 16px;
            border: 2px solid transparent;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: #f0e6d3;
        }
        .nav-card:active {
            transform: scale(0.95);
            transition: 0.15s ease;
        }
        .nav-card .nav-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            flex-shrink: 0;
            transition: var(--transition);
        }
        .nav-card.home-card .nav-icon {
            background: rgba(108, 92, 231, 0.1);
        }
        .nav-card.page2-card .nav-icon {
            background: rgba(0, 184, 148, 0.1);
        }
        .nav-card:hover .nav-icon {
            transform: scale(1.15) rotate(-8deg);
        }
        .nav-card .nav-info h4 {
            font-size: 1.05rem;
            font-weight: 700;
            color: #1a202c;
            margin: 0 0 2px;
        }
        .nav-card .nav-info span {
            font-size: 0.85rem;
            color: #8b9aab;
        }
        .nav-card .nav-arrow {
            margin-left: auto;
            font-size: 1.3rem;
            color: #b2bec3;
            transition: var(--transition);
        }
        .nav-card:hover .nav-arrow {
            color: #f0a500;
            transform: translateX(4px);
        }

        .footer-note {
            font-size: 0.85rem;
            color: #a0aec0;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="page-badge">🎨 第 3 页 · 创意空间</span>
        <h1>点燃<span class="highlight">创意</span>火花</h1>
        <p class="subtitle">在这里，灵感自由流淌，想象力没有边界</p>

        <div class="showcase">
            <span class="emoji-big">💡</span>
            <h2>设计 · 灵感 · 无限</h2>
            <p>每一个伟大的作品都始于一个简单的想法。让创意成为你的指南针，在未知的领域里勇敢探索，创造属于你的独特印记。</p>
        </div>

        <p style="font-size:0.95rem;color:#5a6c7d;margin-bottom:18px;font-weight:600;">
            🔗 点击下方卡片跳转至其他页面
        </p>

        <div class="nav-cards">
            <!-- 跳转回首页 -->
            <a href="index.html" class="nav-card home-card" title="返回首页">
                <div class="nav-icon">🏠</div>
                <div class="nav-info">
                    <h4>返回首页</h4>
                    <span>探索世界主页</span>
                </div>
                <span class="nav-arrow">→</span>
            </a>

            <!-- 跳转到页面2 -->
            <a href="page2.html" class="nav-card page2-card" title="前往自然之美">
                <div class="nav-icon">🌿</div>
                <div class="nav-info">
                    <h4>自然之美</h4>
                    <span>宁静的自然风光</span>
                </div>
                <span class="nav-arrow">→</span>
            </a>
        </div>

        <p class="footer-note">💡 你在第3页 · 点击卡片即可跳转</p>
    </div>
</body>
</html>
